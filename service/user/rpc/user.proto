syntax = "proto3";

package user;
option go_package = "./user";

message UserInfo {
    int64 id = 1;
    string username = 2;
    string nickname = 3;
    string mobile = 4;
    string email = 5;
    int32 gender = 6;
    string avatar = 7;
    int32 status = 8;
    string createdAt = 9;
    string updatedAt = 10;
}

message RegisterRequest {
    string username = 1;
    string password = 2;
    string nickname = 3;
    string mobile = 4;
    string email = 5;
}

message RegisterResponse {
    UserInfo user = 1;
}

message LoginRequest {
    string username = 1;
    string password = 2;
}

message LoginResponse {
    UserInfo user = 1;
}

message GetUserRequest {
    int64 id = 1;
}

message GetUserResponse {
    UserInfo user = 1;
}

message UpdateUserRequest {
    int64 id = 1;
    string nickname = 2;
    string avatar = 3;
    int32 gender = 4;
}

message UpdateUserResponse {
    UserInfo user = 1;
}

service User {
    rpc Register(RegisterRequest) returns (RegisterResponse);
    rpc Login(LoginRequest) returns (LoginResponse);
    rpc GetUser(GetUserRequest) returns (GetUserResponse);
    rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
}
